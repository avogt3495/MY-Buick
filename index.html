<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MY BUICK v2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>MY BUICK</h1>
        <p>2010 LaCrosse CXL • 3.0L LF1 • FWD</p>
      </div>
      <span class="version">v2 Airbox</span>
    </header>

    <section class="modebar">
      <button id="exploreBtn" class="active">Explore</button>
      <button id="repairBtn">Repair</button>
      <button id="layerBtn">Layer View</button>
      <button id="resetBtn">Reset</button>
    </section>

    <section class="stageShell">
      <div id="stage" class="stage">
        <div id="world" class="world">
          <img id="layer0" class="layerImg active" src="images/airbox/00_installed.jpeg" alt="Airbox installed" />
          <img id="layer1" class="layerImg" src="images/airbox/01_filter_visible.jpeg" alt="Air filter visible" />
          <img id="layer2" class="layerImg" src="images/airbox/02_filter_removed.jpeg" alt="Air filter removed" />
          <svg id="overlay" class="overlay" viewBox="0 0 100 133" preserveAspectRatio="none">
            <path id="airboxOutline" class="partOutline" d="M8,40 L30,36 L53,42 L78,45 L87,59 L89,81 L80,97 L47,102 L18,96 L5,78 L4,54 Z" />
          </svg>
          <div id="dots" class="dots"></div>
        </div>
      </div>
      <div id="hint" class="hint">Drag to move • Pinch to zoom • Tap Repair for blue dots</div>
    </section>

    <section id="repairHud" class="repairHud hidden">
      <div>
        <strong id="stepTitle">Step 1: Remove T25 screws</strong>
        <span id="stepSub">Tap each blue dot after removing that screw.</span>
      </div>
      <div class="counter"><span id="removedCount">0</span>/<span id="totalCount">7</span></div>
      <button id="nextStep" disabled>Next</button>
    </section>

    <section id="card" class="card">
      <div class="grabber"></div>
      <div class="cardHeader">
        <div>
          <h2>Air Filter Housing</h2>
          <p>Passenger side intake airbox</p>
        </div>
        <span class="verified">Alex Verified ✓</span>
      </div>
      <div class="stats">
        <div><strong>1/5</strong><span>Difficulty</span></div>
        <div><strong>5–10</strong><span>Minutes</span></div>
        <div><strong>T25</strong><span>Torx</span></div>
      </div>
      <nav class="tabs">
        <button class="tab active" data-tab="overview">Overview</button>
        <button class="tab" data-tab="tips">Garage Tips</button>
        <button class="tab" data-tab="inspect">Inspect</button>
        <button class="tab" data-tab="layers">Layers</button>
      </nav>
      <div id="tabContent" class="tabContent"></div>
      <div class="actions">
        <button id="guideBtn" class="primary">Guide Me</button>
        <button id="fastenersBtn">Show Fasteners</button>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
