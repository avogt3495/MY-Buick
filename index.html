<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MY BUICK v2.2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>MY BUICK</h1>
        <p>2010 LaCrosse CXL • 3.0L LF1 • FWD</p>
      </div>
      <span class="version">v2.2 Airbox</span>
    </header>

    <section class="modebar" aria-label="App modes">
      <button id="exploreBtn" class="active">Explore</button>
      <button id="repairBtn">Repair</button>
      <button id="layerBtn">Layer View</button>
      <button id="resetBtn">Reset</button>
    </section>

    <section id="stageShell" class="stageShell">
      <div id="stage" class="stage" aria-label="Interactive airbox image">
        <div id="world" class="world">
          <img id="layer0" class="layerImg active" src="images/airbox/00_installed.jpg" alt="Airbox installed" />
          <img id="layer1" class="layerImg" src="images/airbox/01_filter_visible.jpg" alt="Airbox lid removed with filter visible" />
          <img id="layer2" class="layerImg" src="images/airbox/02_filter_removed.jpg" alt="Air filter removed showing lower airbox" />
          <svg id="overlay" class="overlay" viewBox="0 0 100 133" preserveAspectRatio="none">
            
          </svg>
          <div id="dots" class="dots"></div>
        </div>
      </div>
      <div id="stageBadge" class="stageBadge">Explore Mode • Drag, pinch, or tap Repair</div>
    </section>

    <section id="repairHud" class="repairHud hidden" aria-live="polite">
      <div class="hudText">
        <strong id="stepTitle">Step 1: Remove T25 screws</strong>
        <span id="stepSub">Tap each blue dot after removing that screw.</span>
      </div>
      <div class="fastenerMeter"><span id="dotMini"></span><b><span id="removedCount">0</span>/<span id="totalCount">7</span></b></div>
      <button id="nextStep" disabled>Next</button>
    </section>

    <section id="card" class="card compact">
      <button id="cardToggle" class="grabber" aria-label="Toggle details"></button>
      <div class="cardHeader">
        <div>
          <h2>Air Filter Housing</h2>
          <p>Passenger side intake airbox</p>
        </div>
        <span class="verified">Alex Verified ✓</span>
      </div>
      <div class="stats">
        <div><strong>1/5</strong><span>Difficulty</span></div>
        <div><strong>5–10</strong><span>Minutes</span></div>
        <div><strong>T25</strong><span>Torx</span></div>
      </div>
      <nav class="tabs">
        <button class="tab active" data-tab="overview">Overview</button>
        <button class="tab" data-tab="tips">Garage Tips</button>
        <button class="tab" data-tab="inspect">Inspect</button>
        <button class="tab" data-tab="layers">Layers</button>
      </nav>
      <div id="tabContent" class="tabContent"></div>
      <div class="actions">
        <button id="guideBtn" class="primary">Guide Me</button>
        <button id="fastenersBtn">Show Fasteners</button>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
