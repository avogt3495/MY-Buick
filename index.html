<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MY BUICK v2.6 Registration - Airbox Stabilized</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Verified release: MY BUICK v2.6 Registration Pass - Airbox Stabilized -->
  <div class="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">MY BUICK v2.6R</div>
        <h1>Airbox Gold Standard</h1>
      </div>
      <div class="top-actions">
        <button id="resetBtn" class="ghost-btn">Reset</button>
      </div>
    </header>

    <main class="stage-wrap">
      <section id="stage" class="stage" aria-label="Airbox repair photo viewer">
        <img id="layerImg" class="layer-img" src="images/airbox/00_installed.jpg" alt="Airbox installed" draggable="false" />
        <div id="markerLayer" class="marker-layer" aria-label="Airbox fastener markers"></div>
      </section>
    </main>

    <section class="repair-panel">
      <div class="panel-head">
        <div>
          <div class="eyebrow">AIR FILTER HOUSING</div>
          <h2 id="stepTitle">Step 1: Remove lid fasteners</h2>
        </div>
        <div id="layerBadge" class="layer-badge">Installed</div>
      </div>

      <div class="progress-row">
        <div class="progress-text"><span id="completeCount">0</span>/7 completed</div>
        <div class="progress-bar"><div id="progressFill"></div></div>
      </div>

      <p id="stepText" class="step-text">Tap each blue T25 screw marker, then tap the red rear clip marker.</p>

      <div class="actions">
        <button id="prevBtn" class="secondary">Back</button>
        <button id="nextBtn" class="primary">Next Layer</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
