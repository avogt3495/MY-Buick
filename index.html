<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MY BUICK v2.7 | Airbox Gold</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">MY BUICK v2.7</p>
        <h1>Airbox Gold Standard</h1>
      </div>
      <button id="resetBtn" class="small-btn">Reset</button>
    </header>

    <section class="stage-wrap">
      <div id="stage" class="stage" aria-label="Interactive airbox repair view">
        <img id="baseImage" class="base-image" src="images/airbox/00_installed.jpg" alt="Airbox installed" draggable="false" />

        <svg id="outlineSvg" class="outline-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          <path id="airboxOutline" class="airbox-outline" d="M 14 30 L 33 22 L 57 22 L 77 30 L 86 48 L 81 70 L 61 82 L 34 80 L 16 67 L 9 46 Z" />
        </svg>

        <div id="lidMover" class="part-mover lid-mover" aria-hidden="true"></div>
        <div id="filterMover" class="part-mover filter-mover" aria-hidden="true"></div>

        <div id="markerLayer" class="marker-layer" aria-label="Fastener markers"></div>
      </div>
    </section>

    <section class="control-card">
      <div class="step-row">
        <div>
          <p class="eyebrow">Current step</p>
          <h2 id="stepTitle">Remove airbox lid fasteners</h2>
        </div>
        <div id="counter" class="counter">0 / 7</div>
      </div>
      <p id="stepText" class="step-text">Tap the 6 T25 screws and the rear clip. The markers stay locked to the photo using percentage tracking.</p>
      <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
      <div class="button-row">
        <button id="prevBtn" class="ghost-btn">Back</button>
        <button id="nextBtn" class="primary-btn" disabled>Next step</button>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
